<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ARTASAS - Sign up">
  <meta name="theme-color" content="#0a0a0f">
  <title>Sign up — ARTASAS</title>
  <link rel="icon" type="image/png" href="FAVICON.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #000;
      color: #e0e0e0;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.3), transparent);
      background-repeat: repeat;
      background-size: 200px 200px;
      pointer-events: none;
      opacity: 0.6;
    }

    .logo {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    .logo a { display: block; opacity: 0.7; transition: opacity 0.3s; }
    .logo a:hover { opacity: 1; }
    .logo img { height: 21px; width: auto; }

    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px 32px;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 500;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      margin-bottom: 32px;
    }

    .google-btn {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .google-btn svg { width: 18px; height: 18px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .divider span {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-input::placeholder { color: rgba(255, 255, 255, 0.2); }
    .form-input:focus { border-color: rgba(255, 255, 255, 0.3); }

    .submit-btn {
      width: 100%;
      padding: 12px 16px;
      background: #fff;
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s ease;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }

    .auth-footer a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff6b6b;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .password-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="logo"><a href="index.html"><img src="logo2.png" alt="ARTASAS"></a></div>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join the ARTASAS community</p>

      <div class="error-msg" id="error-msg"></div>

      <button class="google-btn" id="google-btn">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider"><span>or</span></div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" id="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Create a password" required minlength="6">
          <div class="password-hint">At least 6 characters</div>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Create account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { registerWithEmail, loginWithGoogle, handleGoogleRedirect, onAuth } from './assets/js/auth.js';

    // Handle redirect result (if coming back from Google redirect)
    try {
      const result = await handleGoogleRedirect();
      if (result) {
        window.location.href = 'home_logada.html';
      }
    } catch (err) {
      console.error('Redirect error:', err);
    }

    // If already logged in, redirect
    onAuth((user) => {
      if (user) window.location.href = 'home_logada.html';
    });

    const form = document.getElementById('signup-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('google-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    // Email signup
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await registerWithEmail(email, password, name);
      } catch (err) {
        const messages = {
          'auth/email-already-in-use': 'An account with this email already exists.',
          'auth/invalid-email': 'Please enter a valid email.',
          'auth/weak-password': 'Password must be at least 6 characters.'
        };
        showError(messages[err.code] || 'Registration failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });

    // Google signup
    googleBtn.addEventListener('click', async () => {
      hideError();
      googleBtn.disabled = true;
      googleBtn.style.opacity = '0.6';

      try {
        await loginWithGoogle();
      } catch (err) {
        console.error('Google sign-in error:', err.code, err.message);
        googleBtn.disabled = false;
        googleBtn.style.opacity = '';

        if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') {
          return;
        }

        const messages = {
          'auth/unauthorized-domain': 'This domain is not authorized. Add it in Firebase Console > Authentication > Settings > Authorized domains.',
          'auth/popup-blocked': 'Popup was blocked. Trying redirect instead...',
          'auth/internal-error': 'Authentication service error. Make sure Google sign-in is enabled in Firebase Console.',
          'auth/operation-not-allowed': 'Google sign-in is not enabled. Enable it in Firebase Console > Authentication > Sign-in method.'
        };
        showError(messages[err.code] || `Google sign-in failed (${err.code || 'unknown'}). ${err.message || ''}`);
      }
    });
  </script>
</body>
</html>
