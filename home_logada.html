<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ARTASAS - Your Creative Space">
  <meta name="theme-color" content="#0a0a0f">
  <title>Home — ARTASAS</title>
  <link rel="icon" type="image/png" href="FAVICON.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    html, body {
      min-height: 100%;
      background: #000;
      color: #e0e0e0;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Top Navigation Bar */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      margin-right: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      transition: opacity 0.2s ease;
    }

    .nav-logo:hover {
      opacity: 0.8;
    }

    .nav-logo img {
      height: 19px;
      width: auto;
      flex-shrink: 0;
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 8px;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      position: relative;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      border-radius: 24px;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-link.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-link .badge {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #e60023;
      border-radius: 50%;
    }

    /* Search Bar */
    .nav-center {
      flex: 1;
      max-width: 600px;
      margin: 0 24px;
    }

    .search-container {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      padding: 11px 46px 11px 44px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      font-size: 13px;
      color: #fff;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      pointer-events: none;
    }

    .search-icon svg {
      width: 20px;
      height: 20px;
    }

    .search-actions {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-action-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .search-action-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
    }

    .search-action-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Right Side */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .create-btn {
      padding: 12px 22px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .create-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.45);
      color: #fff;
    }

    .nav-icon-btn {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-icon-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
    }

    .nav-icon-btn svg {
      width: 18px;
      height: 18px;
    }

    .user-avatar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .user-avatar:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .user-avatar img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .user-avatar .dropdown-arrow {
      color: rgba(255, 255, 255, 0.5);
    }

    .user-avatar .dropdown-arrow svg {
      width: 14px;
      height: 14px;
    }

    /* Main Content */
    .main-content {
      padding-top: 74px;
      min-height: 100vh;
    }

    /* Feed Grid */
    .feed-container {
      padding: 20px 24px;
    }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .feed-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .feed-item:hover {
      transform: translateY(-4px);
    }

    .feed-item img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .feed-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,0,0,0.6));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .feed-item:hover .feed-item-overlay {
      opacity: 1;
    }

    .feed-save-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 8px 14px;
      background: #e60023;
      border: none;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      opacity: 0;
      transform: translateY(-4px);
      transition: all 0.2s ease;
    }

    .feed-item:hover .feed-save-btn {
      opacity: 1;
      transform: translateY(0);
    }

    .feed-save-btn:hover {
      background: #ad081b;
    }

    .feed-item-info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .feed-item:hover .feed-item-info {
      opacity: 1;
    }

    .feed-author {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
    }

    .feed-author img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #fff;
    }

    /* Upload Modal */
    .upload-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .upload-overlay.active { opacity: 1; visibility: visible; }

    .upload-modal {
      width: 520px;
      max-width: 90vw;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 36px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .upload-overlay.active .upload-modal { transform: translateY(0); }

    .upload-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .upload-modal-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .upload-modal-close {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.06);
      border: none;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .upload-modal-close:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

    .upload-dropzone {
      position: relative;
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .upload-dropzone:hover,
    .upload-dropzone.dragover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.04);
    }

    .upload-dropzone-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.5);
    }

    .upload-dropzone-icon svg { width: 24px; height: 24px; }

    .upload-dropzone-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .upload-dropzone-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
    }

    .upload-dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .upload-preview-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: #0a0a0a;
    }

    .upload-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-preview-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .upload-preview-item:hover .upload-preview-remove { opacity: 1; }

    .upload-submit-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #fff;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.4;
      pointer-events: none;
    }

    .upload-submit-btn.ready {
      opacity: 1;
      pointer-events: auto;
    }

    .upload-submit-btn.ready:hover { background: #e0e0e0; }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav {
        padding: 0 12px;
        height: 50px;
      }

      .nav-links,
      .nav-divider {
        display: none;
      }

      .nav-logo {
        margin-right: 0;
      }

      .nav-center {
        margin: 0 12px;
      }

      .search-input {
        padding: 12px 44px 12px 44px;
        font-size: 14px;
      }

      .create-btn {
        padding: 10px 16px;
        font-size: 14px;
      }

      .nav-icon-btn {
        width: 40px;
        height: 40px;
      }

      .feed-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .feed-container {
        padding: 12px 16px;
      }
    }
  </style>
</head>

        <span class="dropdown-arrow">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </span>
      </button>
      <div class="user-dropdown" id="user-dropdown" style="display:none;position:absolute;top:50px;right:24px;background:rgba(20,20,20,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px 0;min-width:180px;z-index:1001;">
        <div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);">
          <div style="font-size:14px;color:#fff;font-weight:500;" id="dropdown-name"></div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px;" id="dropdown-email"></div>
        </div>
        <a href="profile.html" style="display:block;padding:10px 16px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:13px;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">Profile</a>
        <button id="logout-btn" style="display:block;width:100%;text-align:left;padding:10px 16px;background:none;border:none;color:rgba(255,80,80,0.8);font-size:13px;font-family:inherit;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">Log out</button>
      </div>
    </div>
  </nav>

  <!-- Upload Modal -->
  <div class="upload-overlay" id="upload-overlay">
    <div class="upload-modal">
      <div class="upload-modal-header">
        <span class="upload-modal-title">Upload Images</span>
        <button class="upload-modal-close" id="upload-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="upload-dropzone" id="upload-dropzone">
        <div class="upload-dropzone-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="upload-dropzone-text">Drag & drop images here or click to browse</div>

      </div>
      <div class="upload-preview-grid" id="upload-preview-grid"></div>
      <button class="upload-submit-btn" id="upload-submit">Upload Images</button>
    </div>
  </div>

  <!-- Save to Board Modal -->
  <div class="upload-overlay" id="board-overlay">
    <div class="upload-modal" style="max-width:420px;">
      <div class="upload-modal-header">
        <span class="upload-modal-title">Save to board</span>
        <button class="upload-modal-close" id="board-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="board-list" style="max-height:300px;overflow-y:auto;"></div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;">
        <div style="display:flex;gap:8px;">
          <input type="text" id="new-board-name" class="search-input" placeholder="New board name" style="flex:1;padding:10px 14px;border-radius:10px;">
          <button id="create-board-btn" style="padding:10px 18px;background:#fff;border:none;border-radius:10px;color:#000;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <div class="feed-container">
      <div id="feed-loading" style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.4);font-size:14px;">Loading feed...</div>
      <div class="feed-grid" id="feed-grid"></div>
    </div>
  </main>

  <style>
    .board-option { display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.15s;border-radius:8px; }
    .board-option:hover { background:rgba(255,255,255,0.06); }
    .board-cover { width:48px;height:48px;border-radius:8px;overflow:hidden;background:#1a1a1a;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px; }
    .board-cover img { width:100%;height:100%;object-fit:cover; }
    .board-cover .empty { background:rgba(255,255,255,0.04); }
    .board-info { flex:1; }
    .board-info .name { font-size:14px;color:#fff;font-weight:500; }
    .board-info .count { font-size:12px;color:rgba(255,255,255,0.4); }
    .upload-progress { position:absolute;bottom:0;left:0;height:3px;background:#fff;border-radius:0 0 20px 20px;transition:width 0.3s ease; }
  </style>

  <script type="module">
    import { requireAuth } from './assets/js/auth-guard.js';
    import { logout } from './assets/js/auth.js';
    import { uploadImage } from './assets/js/storage.js';
    import { createArtwork, getArtworks, saveArtwork, unsaveArtwork, getUserBoards, createBoard, addArtworkToBoard } from './assets/js/db.js';

    const user = await requireAuth();

    // ── User UI ──
    function generateAvatar(name, size = 56) {
      const initial = (name || '?').charAt(0).toUpperCase();
      return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" rx="${size/2}" fill="#333"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="#ccc" font-size="${size * 0.45}" font-family="sans-serif" font-weight="500">${initial}</text></svg>`)}`;
    }

    const avatarImg = document.getElementById('user-avatar-img');
    const dropdownName = document.getElementById('dropdown-name');
    const dropdownEmail = document.getElementById('dropdown-email');

    if (user.photoURL) {
      const testImg = new Image();
      testImg.onload = () => { avatarImg.src = user.photoURL; };
      testImg.onerror = () => { avatarImg.src = generateAvatar(user.displayName); };
      testImg.src = user.photoURL;
    } else {
      avatarImg.src = generateAvatar(user.displayName);
    }

    dropdownName.textContent = user.displayName || 'User';
    dropdownEmail.textContent = user.email;

    // Dropdown
    const avatarBtn = document.getElementById('user-avatar-btn');
    const dropdown = document.getElementById('user-dropdown');
    avatarBtn.addEventListener('click', () => {
      dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    });
    document.addEventListener('click', (e) => {
      if (!avatarBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
    });
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await logout();
      window.location.href = 'index.html';
    });

    // ── Feed ──
    const feedGrid = document.getElementById('feed-grid');
    const feedLoading = document.getElementById('feed-loading');

    // Local fallback images
    const localImages = [
      '025ce04a-753c-4ac0-90fc-724966e35fa5.jpeg', '03cdbf2e8d84091b535378b6f3e28b7d.jpg',
      '04d800fd-d969-41e8-adf8-64ebf6eb37e1.jpeg', '16fab7bb-6495-4d45-b25d-494055a4b33c.jpeg',
      '2a3335cdc27bdc677f89863667c354dc.jpg', '34170add96db0159709f82efb83f7c39.jpg',
      '37e7433f65e6064acf64c1993810b0cf.jpg', '3df2bb29-8609-42d8-ac77-e68dbef4b475.jpeg',
      '57cbd7bdd778d87b337dc1120769decb.jpg', '6a8b2dc0-12fc-4ba3-aa31-aff359a761e8.jpeg',
      '6e89fb39-3096-4e92-9f32-e6101f6ff825.jpeg', '6f53ae36-505b-440f-affe-0cc0cf9e8529.jpeg',
      '71097654-382a-46ec-a3d4-2478ae087251.jpeg', '74d2981eb2e8400526272f86c55bc5d6.jpg',
      '965d8b1dcc482979f0329b574cfd1108.jpg', '9d4b466353bc2ec699b8062a163db00c.jpg',
      'G__9DIUbcAAt_cy.jpeg', 'G_6ATQ2XoAA95dV.jpeg', 'G_Cw8iBW0AAcDiV.jpeg',
      'G2naqcabIAEp8jE.jpeg', 'G36PhxlWcAAxPr5.jpeg', 'G5BFNOzWYAAuMHi.jpeg',
      'Gz7G_5rXEAAc7mt.jpeg', 'GzHnXerWoAAp5lI.jpeg', 'HAD4TeTbAAA7suu.jpeg',
      'HAE4mByWMAAAzbd.jpeg', 'HAGeCV-XkAAVCu2.jpeg', 'HAOPIy1WAAA-j5X.jpeg', 'TRUST.png'
    ];

    function createFeedItem(artwork) {
      const isFirestore = !!artwork.id;
      const imgSrc = artwork.imageUrl || artwork;
      const authorName = artwork.uploaderName || '';
      const authorAvatar = artwork.uploaderAvatar || '';
      const isSaved = isFirestore && artwork.savedBy && artwork.savedBy.includes(user.uid);

      const item = document.createElement('div');
      item.className = 'feed-item';
      if (isFirestore) item.dataset.artworkId = artwork.id;

      item.innerHTML = `
        <img src="${imgSrc}" alt="Image" loading="lazy">
        <div class="feed-item-overlay"></div>
        <div style="position:absolute;top:12px;right:12px;display:flex;gap:6px;opacity:0;transform:translateY(-4px);transition:all 0.2s ease;" class="feed-actions">
          <button class="feed-save-btn" style="position:static;opacity:1;transform:none;${isSaved ? 'background:#111;' : ''}">${isSaved ? 'Saved' : 'Save'}</button>
          ${isFirestore ? '<button class="feed-save-btn feed-board-btn" style="position:static;opacity:1;transform:none;background:rgba(0,0,0,0.6);padding:8px 10px;" title="Save to board"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M12 5v14M5 12h14"/></svg></button>' : ''}
        </div>
        ${authorName ? `
        <div class="feed-item-info">
          <div class="feed-author">
            ${authorAvatar ? `<img src="${authorAvatar}" alt="${authorName}">` : ''}
            <span>${authorName}</span>
          </div>
        </div>` : ''}
      `;

      // Show actions on hover
      item.addEventListener('mouseenter', () => {
        item.querySelector('.feed-actions').style.opacity = '1';
        item.querySelector('.feed-actions').style.transform = 'translateY(0)';
      });
      item.addEventListener('mouseleave', () => {
        item.querySelector('.feed-actions').style.opacity = '0';
        item.querySelector('.feed-actions').style.transform = 'translateY(-4px)';
      });

      // Save/unsave
      const saveBtn = item.querySelector('.feed-save-btn');
      saveBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (!isFirestore) return;
        const artId = artwork.id;
        if (saveBtn.textContent === 'Saved') {
          await unsaveArtwork(artId);
          saveBtn.textContent = 'Save';
          saveBtn.style.background = '#e60023';
        } else {
          await saveArtwork(artId);
          saveBtn.textContent = 'Saved';
          saveBtn.style.background = '#111';
        }
      });

      // Save to board
      const boardBtn = item.querySelector('.feed-board-btn');
      if (boardBtn) {
        boardBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openBoardModal(artwork.id, imgSrc);
        });
      }

      return item;
    }

    async function loadFeed() {
      try {
        const artworks = await getArtworks(60);
        feedLoading.style.display = 'none';

        if (artworks.length > 0) {
          artworks.forEach(art => feedGrid.appendChild(createFeedItem(art)));
        }

        // Add local images as fallback/filler
        const shuffled = [...localImages].sort(() => Math.random() - 0.5);
        shuffled.forEach(src => feedGrid.appendChild(createFeedItem(src)));
      } catch (err) {
        console.error('Feed load error:', err);
        feedLoading.textContent = 'Could not load feed from server. Showing local gallery.';
        setTimeout(() => { feedLoading.style.display = 'none'; }, 2000);
        const shuffled = [...localImages].sort(() => Math.random() - 0.5);
        shuffled.forEach(src => feedGrid.appendChild(createFeedItem(src)));
      }
    }

    loadFeed();

    // ── Nav links ──
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        if (link.getAttribute('href') === '#') e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });

    // ── Upload ──
    const uploadOverlay = document.getElementById('upload-overlay');
    const uploadClose = document.getElementById('upload-close');
    const uploadDropzone = document.getElementById('upload-dropzone');
    const uploadInput = document.getElementById('upload-input');
    const uploadPreviewGrid = document.getElementById('upload-preview-grid');
    const uploadSubmitBtn = document.getElementById('upload-submit');
    const createBtn = document.querySelector('.create-btn');
    let pendingFiles = [];

    createBtn.addEventListener('click', () => uploadOverlay.classList.add('active'));
    uploadClose.addEventListener('click', () => closeUploadModal());
    uploadOverlay.addEventListener('click', (e) => { if (e.target === uploadOverlay) closeUploadModal(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (boardOverlay.classList.contains('active')) closeBoardModal();
        else if (uploadOverlay.classList.contains('active')) closeUploadModal();
      }
    });

    function closeUploadModal() {
      uploadOverlay.classList.remove('active');
      pendingFiles = [];
      uploadPreviewGrid.innerHTML = '';
      uploadSubmitBtn.classList.remove('ready');
      uploadSubmitBtn.textContent = 'Upload Images';
      uploadSubmitBtn.disabled = false;
    }

    ['dragenter', 'dragover'].forEach(evt => {
      uploadDropzone.addEventListener(evt, (e) => { e.preventDefault(); uploadDropzone.classList.add('dragover'); });
    });
    ['dragleave', 'drop'].forEach(evt => {
      uploadDropzone.addEventListener(evt, () => uploadDropzone.classList.remove('dragover'));
    });

    uploadDropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
    });

    uploadInput.addEventListener('change', () => {
      addFiles([...uploadInput.files]);
      uploadInput.value = '';
    });

    function addFiles(files) {
      files.forEach(file => {
        if (file.size > 20 * 1024 * 1024) return;
        pendingFiles.push(file);
        const reader = new FileReader();
        reader.onload = (e) => {
          const item = document.createElement('div');
          item.className = 'upload-preview-item';
          item.innerHTML = `<img src="${e.target.result}" alt=""><button class="upload-preview-remove">&times;</button>`;
          item.querySelector('.upload-preview-remove').addEventListener('click', () => {
            const idx = [...uploadPreviewGrid.children].indexOf(item);
            pendingFiles.splice(idx, 1);
            item.remove();
            uploadSubmitBtn.classList.toggle('ready', pendingFiles.length > 0);
          });
          uploadPreviewGrid.appendChild(item);
        };
        reader.readAsDataURL(file);
      });
      uploadSubmitBtn.classList.toggle('ready', pendingFiles.length > 0);
    }

    // Real upload to Firebase Storage + Firestore
    const uploadError = document.createElement('div');
    uploadError.style.cssText = 'display:none;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#ff6b6b;margin-top:12px;word-break:break-word;';
    uploadSubmitBtn.parentElement.appendChild(uploadError);

    uploadSubmitBtn.addEventListener('click', async () => {
      if (pendingFiles.length === 0) return;
      uploadSubmitBtn.disabled = true;
      uploadError.style.display = 'none';
      const total = pendingFiles.length;
      let done = 0;
      let lastError = null;

      for (const file of pendingFiles) {
        try {
          uploadSubmitBtn.textContent = `Uploading ${done + 1}/${total}...`;
          const { url } = await uploadImage(file);
          uploadSubmitBtn.textContent = `Saving ${done + 1}/${total}...`;
          const artworkId = await createArtwork({
            imageUrl: url,
            title: file.name.replace(/\.[^.]+$/, ''),
            tags: []
          });
          const artwork = {
            id: artworkId,
            imageUrl: url,
            uploaderName: user.displayName || '',
            uploaderAvatar: user.photoURL || '',
            savedBy: []
          };
          feedGrid.prepend(createFeedItem(artwork));
          done++;
        } catch (err) {
          console.error('Upload failed:', err);
          lastError = err;
        }
      }

      if (lastError && done === 0) {
        uploadSubmitBtn.disabled = false;
        uploadSubmitBtn.textContent = 'Upload Images';
        uploadSubmitBtn.classList.add('ready');
        const msg = lastError.code || lastError.message || String(lastError);
        let hint = '';
        if (msg.includes('storage/unauthorized') || msg.includes('storage/retry-limit') || msg.includes('does not exist')) {
          hint = ' — Make sure Firebase Storage is created and rules allow uploads.';
        } else if (msg.includes('permission') || msg.includes('PERMISSION_DENIED')) {
          hint = ' — Check Firestore/Storage security rules.';
        }
        uploadError.textContent = `Upload failed: ${msg}${hint}`;
        uploadError.style.display = 'block';
      } else {
        closeUploadModal();
      }
    });

    // ── Board Modal ──
    const boardOverlay = document.getElementById('board-overlay');
    const boardClose = document.getElementById('board-close');
    const boardList = document.getElementById('board-list');
    const newBoardInput = document.getElementById('new-board-name');
    const createBoardBtn = document.getElementById('create-board-btn');
    let currentArtworkId = null;
    let currentImageUrl = null;

    boardClose.addEventListener('click', closeBoardModal);
    boardOverlay.addEventListener('click', (e) => { if (e.target === boardOverlay) closeBoardModal(); });

    function closeBoardModal() {
      boardOverlay.classList.remove('active');
      currentArtworkId = null;
      currentImageUrl = null;
    }

    async function openBoardModal(artworkId, imageUrl) {
      currentArtworkId = artworkId;
      currentImageUrl = imageUrl;
      boardOverlay.classList.add('active');
      boardList.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">Loading boards...</div>';

      try {
        const boards = await getUserBoards(user.uid);
        boardList.innerHTML = '';
        if (boards.length === 0) {
          boardList.innerHTML = '<div style="padding:16px;text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">No boards yet. Create one below.</div>';
        } else {
          boards.forEach(board => {
            const el = document.createElement('div');
            el.className = 'board-option';
            const covers = (board.coverUrls || []).slice(0, 4);
            el.innerHTML = `
              <div class="board-cover">
                ${[0,1,2,3].map(i => covers[i] ? `<img src="${covers[i]}" alt="">` : '<div class="empty"></div>').join('')}
              </div>
              <div class="board-info">
                <div class="name">${board.name}</div>
                <div class="count">${board.artworkCount || 0} images</div>
              </div>
            `;
            el.addEventListener('click', async () => {
              try {
                await addArtworkToBoard(board.id, currentArtworkId, currentImageUrl);
                closeBoardModal();
              } catch (err) {
                console.error('Save to board failed:', err);
              }
            });
            boardList.appendChild(el);
          });
        }
      } catch (err) {
        boardList.innerHTML = '<div style="padding:16px;text-align:center;color:#ff6b6b;font-size:13px;">Could not load boards.</div>';
      }
    }

    createBoardBtn.addEventListener('click', async () => {
      const name = newBoardInput.value.trim();
      if (!name) return;
      createBoardBtn.disabled = true;
      createBoardBtn.textContent = '...';

      try {
        const boardId = await createBoard(name);
        if (currentArtworkId) {
          await addArtworkToBoard(boardId, currentArtworkId, currentImageUrl);
        }
        newBoardInput.value = '';
        closeBoardModal();
      } catch (err) {
        console.error('Create board failed:', err);
      } finally {
        createBoardBtn.disabled = false;
        createBoardBtn.textContent = 'Create';
      }
    });
  </script>
</body>
</html>
