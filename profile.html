<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="ARTASAS - Profile">
  <meta name="theme-color" content="#0a0a0f">
  <title>Profile — ARTASAS</title>
  <link rel="icon" type="image/png" href="FAVICON.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    html, body {
      min-height: 100%;
      background: #000;
      color: #e0e0e0;
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.3), transparent);
      background-repeat: repeat;
      background-size: 200px 200px;
      pointer-events: none;
      opacity: 0.6;
    }

    /* Logo */
    .logo {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
    }
    
    .logo a {
      display: block;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    
    .logo a:hover { opacity: 1; }
    .logo img { height: 20px; width: auto; }

    /* Back button */
    .back-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: rgba(255, 255, 255, 0.8);
    }
    
    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Main Container */
    .profile-container {
      padding: 100px 24px 60px;
    }

    /* Profile Header */
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      margin-bottom: 80px;
      padding-bottom: 50px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .profile-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .profile-name {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .profile-username {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.08em;
    }

    .profile-bio {
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.4);
      max-width: 360px;
    }

    .profile-stats {
      display: flex;
      gap: 48px;
      margin-top: 20px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
    }

    .social-links {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      border-color: rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.04);
    }

    .social-link svg {
      width: 18px;
      height: 18px;
    }

    /* Section Title */
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.25);
      margin-bottom: 28px;
      text-align: center;
    }

    /* Boards Section */
    .boards-section {
      margin-bottom: 60px;
    }

    .boards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .board-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .board-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }

    .board-preview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .board-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .board-preview .empty-slot {
      background: rgba(255, 255, 255, 0.03);
    }

    .board-info {
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .board-name {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
    }

    .board-count {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* Images Grid */
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 6px;
      overflow: hidden;
      background: #0a0a0a;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .grid-item:hover {
      opacity: 0.85;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .profile-container {
        padding: 90px 16px 40px;
      }
      
      .profile-avatar {
        width: 64px;
        height: 64px;
      }
      
      .profile-name {
        font-size: 16px;
      }
      
      .profile-stats {
        gap: 32px;
      }
      
      .boards-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
      }
      
      .images-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }
      
      .back-btn {
        padding: 10px 16px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <div class="logo">
    <a href="index.html">
      <img src="logo2.png" alt="ARTASAS">
    </a>
  </div>

  <!-- Back Button -->
  <a href="home_logada.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    Back
  </a>

  <div class="profile-container">
    <div id="profile-loading" style="text-align:center;padding:100px 0;color:rgba(255,255,255,0.4);font-size:14px;">Loading profile...</div>

    <!-- Profile Header -->
    <div class="profile-header" id="profile-header" style="display:none;">
      <div class="profile-avatar">
        <img id="profile-avatar" src="" alt="">
      </div>

      <div class="profile-info">
        <h1 class="profile-name" id="profile-name"></h1>
        <p class="profile-username" id="profile-username"></p>
      </div>

      <p class="profile-bio" id="profile-bio"></p>

      <div id="profile-actions" style="display:none;gap:8px;margin-top:8px;">
        <button id="edit-profile-btn" style="padding:10px 20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:24px;color:#fff;font-family:inherit;font-size:13px;cursor:pointer;transition:all 0.2s ease;">Edit Profile</button>
        <button id="follow-btn" style="display:none;padding:10px 20px;background:#fff;border:none;border-radius:24px;color:#000;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s ease;">Follow</button>
      </div>

      <div class="profile-stats">
        <div class="stat">
          <span class="stat-value" id="images-count">0</span>
          <span class="stat-label">Images</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="boards-count">0</span>
          <span class="stat-label">Boards</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="followers-count">0</span>
          <span class="stat-label">Followers</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="following-count">0</span>
          <span class="stat-label">Following</span>
        </div>
      </div>
    </div>

    <!-- Create Board -->
    <div id="create-board-section" style="display:none;text-align:center;margin-bottom:24px;">
      <div style="display:inline-flex;gap:8px;">
        <input type="text" id="new-board-input" placeholder="New board name" style="padding:10px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:inherit;font-size:13px;outline:none;">
        <button id="create-board-btn" style="padding:10px 18px;background:#fff;border:none;border-radius:10px;color:#000;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;">Create Board</button>
      </div>
    </div>

    <!-- Boards Section -->
    <div class="boards-section">
      <h2 class="section-title">Boards</h2>
      <div class="boards-grid" id="boards-grid"></div>
    </div>

    <!-- Images Section -->
    <div class="images-section">
      <h2 class="section-title">All Images</h2>
      <div class="images-grid" id="images-grid"></div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div id="edit-overlay" style="position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s ease;">
    <div style="width:420px;max-width:90vw;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <span style="font-size:18px;font-weight:600;color:#fff;">Edit Profile</span>
        <button id="edit-close" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border:none;border-radius:50%;color:rgba(255,255,255,0.6);cursor:pointer;font-size:18px;">&times;</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:4px;">Display Name</label>
          <input type="text" id="edit-name" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:inherit;font-size:14px;outline:none;">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:4px;">Username</label>
          <input type="text" id="edit-username" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:inherit;font-size:14px;outline:none;">
        </div>
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:4px;">Bio</label>
          <textarea id="edit-bio" rows="3" style="width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:inherit;font-size:14px;outline:none;resize:vertical;"></textarea>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:4px;">Avatar</label>
          <input type="file" id="edit-avatar" accept="image/*" style="font-size:13px;color:rgba(255,255,255,0.5);">
        </div>
        <button id="edit-save" style="padding:12px;background:#fff;border:none;border-radius:10px;color:#000;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;">Save Changes</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { checkAuth } from './assets/js/auth-guard.js';
    import { getUserProfile, updateUserProfile, getUserBoards, getUserArtworks, followUser, unfollowUser, isFollowing, createBoard } from './assets/js/db.js';
    import { uploadAvatar } from './assets/js/storage.js';
    import { auth, updateProfile } from './assets/js/firebase-config.js';

    const currentUser = await checkAuth();
    if (!currentUser) { window.location.href = 'login.html'; return; }

    // Determine which profile to show
    const params = new URLSearchParams(window.location.search);
    const profileUid = params.get('uid') || currentUser.uid;
    const isOwnProfile = profileUid === currentUser.uid;

    const profileLoading = document.getElementById('profile-loading');
    const profileHeader = document.getElementById('profile-header');

    // Load profile
    let profile = await getUserProfile(profileUid);
    if (!profile) {
      profileLoading.textContent = 'Profile not found.';
      return;
    }

    // Populate header
    profileLoading.style.display = 'none';
    profileHeader.style.display = '';

    const avatarEl = document.getElementById('profile-avatar');
    avatarEl.src = profile.avatarUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(profile.displayName || 'U') + '&background=333&color=fff&size=150';
    document.getElementById('profile-name').textContent = profile.displayName || 'User';
    document.getElementById('profile-username').textContent = profile.username ? '@' + profile.username : '@' + profileUid.slice(0, 8);
    document.getElementById('profile-bio').textContent = profile.bio || '';
    document.getElementById('images-count').textContent = profile.imageCount || 0;
    document.getElementById('boards-count').textContent = profile.boardCount || 0;
    document.getElementById('followers-count').textContent = profile.followerCount || 0;
    document.getElementById('following-count').textContent = profile.followingCount || 0;
    document.title = (profile.displayName || 'User') + ' — ARTASAS';

    // Actions
    const actionsDiv = document.getElementById('profile-actions');
    const editBtn = document.getElementById('edit-profile-btn');
    const followBtn = document.getElementById('follow-btn');

    if (isOwnProfile) {
      actionsDiv.style.display = 'flex';
      editBtn.style.display = '';
      followBtn.style.display = 'none';
      document.getElementById('create-board-section').style.display = 'block';
    } else {
      actionsDiv.style.display = 'flex';
      editBtn.style.display = 'none';
      followBtn.style.display = '';
      const following = await isFollowing(profileUid);
      followBtn.textContent = following ? 'Following' : 'Follow';
      followBtn.style.background = following ? 'rgba(255,255,255,0.06)' : '#fff';
      followBtn.style.color = following ? '#fff' : '#000';
      followBtn.style.border = following ? '1px solid rgba(255,255,255,0.15)' : 'none';

      followBtn.addEventListener('click', async () => {
        followBtn.disabled = true;
        if (followBtn.textContent === 'Follow') {
          await followUser(profileUid);
          followBtn.textContent = 'Following';
          followBtn.style.background = 'rgba(255,255,255,0.06)';
          followBtn.style.color = '#fff';
          followBtn.style.border = '1px solid rgba(255,255,255,0.15)';
        } else {
          await unfollowUser(profileUid);
          followBtn.textContent = 'Follow';
          followBtn.style.background = '#fff';
          followBtn.style.color = '#000';
          followBtn.style.border = 'none';
        }
        followBtn.disabled = false;
      });
    }

    // Load boards
    const boardsGrid = document.getElementById('boards-grid');
    try {
      const boards = await getUserBoards(profileUid);
      boards.forEach(board => {
        const card = document.createElement('div');
        card.className = 'board-card';
        const covers = (board.coverUrls || []).slice(0, 4);
        card.innerHTML = `
          <div class="board-preview">
            ${[0,1,2,3].map(i => covers[i] ? `<img src="${covers[i]}" alt="" loading="lazy">` : '<div class="empty-slot"></div>').join('')}
          </div>
          <div class="board-info">
            <span class="board-name">${board.name}</span>
            <span class="board-count">${board.artworkCount || 0}</span>
          </div>
        `;
        card.addEventListener('click', () => {
          window.location.href = `board.html?id=${board.id}`;
        });
        boardsGrid.appendChild(card);
      });
      if (boards.length === 0) {
        boardsGrid.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:24px;">No boards yet</div>';
      }
    } catch (err) {
      console.error('Load boards error:', err);
    }

    // Create board
    document.getElementById('create-board-btn')?.addEventListener('click', async () => {
      const input = document.getElementById('new-board-input');
      const name = input.value.trim();
      if (!name) return;
      try {
        await createBoard(name);
        input.value = '';
        window.location.reload();
      } catch (err) {
        console.error('Create board error:', err);
      }
    });

    // Load images
    const imagesGrid = document.getElementById('images-grid');
    try {
      const artworks = await getUserArtworks(profileUid);
      document.getElementById('images-count').textContent = artworks.length;
      artworks.forEach(art => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `<img src="${art.imageUrl}" alt="${art.title || ''}" loading="lazy">`;
        imagesGrid.appendChild(item);
      });
      if (artworks.length === 0) {
        imagesGrid.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:24px;">No images yet</div>';
      }
    } catch (err) {
      console.error('Load artworks error:', err);
    }

    // Edit Profile Modal
    const editOverlay = document.getElementById('edit-overlay');
    editBtn.addEventListener('click', () => {
      document.getElementById('edit-name').value = profile.displayName || '';
      document.getElementById('edit-username').value = profile.username || '';
      document.getElementById('edit-bio').value = profile.bio || '';
      editOverlay.style.opacity = '1';
      editOverlay.style.visibility = 'visible';
    });
    document.getElementById('edit-close').addEventListener('click', () => {
      editOverlay.style.opacity = '0';
      editOverlay.style.visibility = 'hidden';
    });

    document.getElementById('edit-save').addEventListener('click', async () => {
      const saveBtn = document.getElementById('edit-save');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const updates = {
          displayName: document.getElementById('edit-name').value.trim(),
          username: document.getElementById('edit-username').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, ''),
          bio: document.getElementById('edit-bio').value.trim()
        };

        const avatarFile = document.getElementById('edit-avatar').files[0];
        if (avatarFile) {
          updates.avatarUrl = await uploadAvatar(avatarFile);
          await updateProfile(currentUser, { photoURL: updates.avatarUrl });
        }

        await updateProfile(currentUser, { displayName: updates.displayName });
        await updateUserProfile(currentUser.uid, updates);
        window.location.reload();
      } catch (err) {
        console.error('Save profile error:', err);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Changes';
      }
    });
  </script>
</body>
</html>
